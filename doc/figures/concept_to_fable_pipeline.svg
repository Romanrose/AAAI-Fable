<svg width="1800" height="980" viewBox="0 0 1800 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font: 700 28px Arial, Helvetica, sans-serif; fill: #111827; }
      .subtitle { font: 400 15px Arial, Helvetica, sans-serif; fill: #4b5563; }
      .phase { font: 700 18px Arial, Helvetica, sans-serif; fill: #1f2937; }
      .box-title { font: 700 17px Arial, Helvetica, sans-serif; fill: #111827; }
      .box-text { font: 400 14px Arial, Helvetica, sans-serif; fill: #374151; }
      .small { font: 400 13px Arial, Helvetica, sans-serif; fill: #4b5563; }
      .mono { font: 400 13px 'Courier New', monospace; fill: #1f2937; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="1800" height="980" fill="#f8fafc"/>

  <text x="60" y="56" class="title">Concept-to-Fable Pipeline for Graph-Grounded Story Generation</text>
  <text x="60" y="86" class="subtitle">Implemented repository flow: K12-KGraph normalization, GraphRAG-style concept retrieval, structure mapping, LLM story generation, review, and batch-ready outputs.</text>

  <rect x="50" y="120" width="1700" height="820" rx="20" fill="#ffffff" stroke="#e5e7eb"/>

  <text x="80" y="160" class="phase">Phase 1. Data Preparation</text>
  <text x="520" y="160" class="phase">Phase 2. Graph Retrieval and Context Packing</text>
  <text x="1030" y="160" class="phase">Phase 3. Structure Mapping and Prompting</text>
  <text x="1450" y="160" class="phase">Phase 4. Story Generation and Review</text>

  <rect x="80" y="190" width="340" height="170" rx="18" fill="#eef2ff" stroke="#c7d2fe" filter="url(#shadow)"/>
  <text x="105" y="225" class="box-title">K12-KGraph Assets</text>
  <text x="105" y="252" class="box-text">• global_KG/nodes.json</text>
  <text x="105" y="274" class="box-text">• global_KG/edges.json</text>
  <text x="105" y="296" class="box-text">• subject_specific_KG/*.json</text>
  <text x="105" y="318" class="box-text">• K12-Bench / K12-Train</text>
  <text x="105" y="345" class="small">Raw graph assets and curriculum-aligned concept metadata.</text>

  <rect x="80" y="410" width="340" height="170" rx="18" fill="#ecfeff" stroke="#a5f3fc" filter="url(#shadow)"/>
  <text x="105" y="445" class="box-title">Normalization Layer</text>
  <text x="105" y="472" class="box-text">kg_rag normalize-k12</text>
  <text x="105" y="494" class="box-text">• merge global and subject graphs</text>
  <text x="105" y="516" class="box-text">• enrich definitions / aliases / examples</text>
  <text x="105" y="538" class="box-text">• build retrieval_text for each node</text>
  <text x="105" y="565" class="small">Output: normalized offline graph artifact.</text>

  <rect x="80" y="630" width="340" height="180" rx="18" fill="#f0fdf4" stroke="#bbf7d0" filter="url(#shadow)"/>
  <text x="105" y="665" class="box-title">Normalized Graph Artifact</text>
  <text x="105" y="692" class="mono">data/derived/kg_rag/</text>
  <text x="105" y="714" class="mono">k12_kgraph_normalized.json</text>
  <text x="105" y="741" class="box-text">Meta:</text>
  <text x="105" y="763" class="box-text">• nodes, edges</text>
  <text x="105" y="785" class="box-text">• label distribution</text>
  <text x="105" y="807" class="box-text">• retrieval-ready node properties</text>

  <rect x="500" y="240" width="380" height="170" rx="18" fill="#eef2ff" stroke="#c7d2fe" filter="url(#shadow)"/>
  <text x="525" y="275" class="box-title">Concept Seed Resolution</text>
  <text x="525" y="302" class="box-text">Input: concept name or alias</text>
  <text x="525" y="324" class="box-text">• preview_normalized_seed</text>
  <text x="525" y="346" class="box-text">• or Neo4j-backed query-subgraph</text>
  <text x="525" y="373" class="small">Find the target concept node and local neighborhood.</text>

  <rect x="500" y="470" width="380" height="180" rx="18" fill="#ecfeff" stroke="#a5f3fc" filter="url(#shadow)"/>
  <text x="525" y="505" class="box-title">Local Subgraph Retrieval</text>
  <text x="525" y="532" class="box-text">• 1–2 hop concept-centered neighborhood</text>
  <text x="525" y="554" class="box-text">• prerequisites_for</text>
  <text x="525" y="576" class="box-text">• relates_to / leads_to</text>
  <text x="525" y="598" class="box-text">• verifies / tests_concept / tests_skill</text>
  <text x="525" y="625" class="small">GraphRAG-style retrieval over explicit graph structure.</text>

  <rect x="500" y="700" width="380" height="160" rx="18" fill="#f0fdf4" stroke="#bbf7d0" filter="url(#shadow)"/>
  <text x="525" y="735" class="box-title">Subgraph Pack</text>
  <text x="525" y="762" class="box-text">Structured sections:</text>
  <text x="525" y="784" class="box-text">• seed • prerequisites • related_concepts</text>
  <text x="525" y="806" class="box-text">• outcomes • experiments • exercises</text>
  <text x="525" y="833" class="small">LLM-ready context blocks for downstream prompting.</text>

  <rect x="1010" y="240" width="360" height="170" rx="18" fill="#eef2ff" stroke="#c7d2fe" filter="url(#shadow)"/>
  <text x="1035" y="275" class="box-title">Prompt Assembly</text>
  <text x="1035" y="302" class="box-text">• teaching prompt</text>
  <text x="1035" y="324" class="box-text">• mapping prompt</text>
  <text x="1035" y="346" class="box-text">• story prompt</text>
  <text x="1035" y="373" class="small">Graph-grounded prompts derived from the packed context.</text>

  <rect x="1010" y="470" width="360" height="190" rx="18" fill="#ecfeff" stroke="#a5f3fc" filter="url(#shadow)"/>
  <text x="1035" y="505" class="box-title">Structure Mapping Planner</text>
  <text x="1035" y="532" class="box-text">Output fields:</text>
  <text x="1035" y="554" class="box-text">• source_domain</text>
  <text x="1035" y="576" class="box-text">• entities</text>
  <text x="1035" y="598" class="box-text">• event_chain</text>
  <text x="1035" y="620" class="box-text">• conflict / turning_point / resolution_state</text>
  <text x="1035" y="642" class="box-text">• alignment_plan</text>
  <text x="1035" y="669" class="small">Translate concept structure into a story skeleton.</text>

  <rect x="1010" y="730" width="360" height="130" rx="18" fill="#f0fdf4" stroke="#bbf7d0" filter="url(#shadow)"/>
  <text x="1035" y="765" class="box-title">Plan Artifact</text>
  <text x="1035" y="792" class="mono">structure_plan.json</text>
  <text x="1035" y="819" class="small">Stable bridge between retrieval and generation.</text>

  <rect x="1440" y="220" width="280" height="170" rx="18" fill="#eef2ff" stroke="#c7d2fe" filter="url(#shadow)"/>
  <text x="1465" y="255" class="box-title">Writer Stage</text>
  <text x="1465" y="282" class="box-text">Local mode:</text>
  <text x="1465" y="304" class="box-text">• heuristic draft writer</text>
  <text x="1465" y="331" class="box-text">LLM mode:</text>
  <text x="1465" y="353" class="box-text">• DeepSeek-compatible chat completion</text>
  <text x="1465" y="380" class="small">Generate concept-grounded draft stories.</text>

  <rect x="1440" y="450" width="280" height="170" rx="18" fill="#ecfeff" stroke="#a5f3fc" filter="url(#shadow)"/>
  <text x="1465" y="485" class="box-title">Reviewer Stage</text>
  <text x="1465" y="512" class="box-text">• JSON-only review prompt</text>
  <text x="1465" y="534" class="box-text">• pass_fail</text>
  <text x="1465" y="556" class="box-text">• missing_roles</text>
  <text x="1465" y="578" class="box-text">• coherence_issues</text>
  <text x="1465" y="605" class="small">Structured LLM review plus local checklist.</text>

  <rect x="1440" y="680" width="280" height="180" rx="18" fill="#f0fdf4" stroke="#bbf7d0" filter="url(#shadow)"/>
  <text x="1465" y="715" class="box-title">Outputs and Batch-Ready Artifacts</text>
  <text x="1465" y="742" class="box-text">• draft_story.txt</text>
  <text x="1465" y="764" class="box-text">• review_response.json</text>
  <text x="1465" y="786" class="box-text">• review_checklist.json</text>
  <text x="1465" y="808" class="box-text">• per-concept run directories</text>
  <text x="1465" y="835" class="small">Ready for large-scale concept-to-story generation.</text>

  <path d="M420 275 C455 275, 465 275, 500 275" stroke="#64748b" stroke-width="3.5" marker-end="url(#arrow)"/>
  <path d="M420 495 C455 495, 465 550, 500 550" stroke="#64748b" stroke-width="3.5" marker-end="url(#arrow)"/>
  <path d="M420 720 C455 720, 465 780, 500 780" stroke="#64748b" stroke-width="3.5" marker-end="url(#arrow)"/>

  <path d="M880 325 C940 325, 950 325, 1010 325" stroke="#64748b" stroke-width="3.5" marker-end="url(#arrow)"/>
  <path d="M880 560 C940 560, 950 560, 1010 560" stroke="#64748b" stroke-width="3.5" marker-end="url(#arrow)"/>
  <path d="M880 780 C940 780, 950 780, 1010 780" stroke="#64748b" stroke-width="3.5" marker-end="url(#arrow)"/>

  <path d="M1370 325 C1405 325, 1410 305, 1440 305" stroke="#64748b" stroke-width="3.5" marker-end="url(#arrow)"/>
  <path d="M1370 565 C1405 565, 1410 535, 1440 535" stroke="#64748b" stroke-width="3.5" marker-end="url(#arrow)"/>
  <path d="M1370 790 C1405 790, 1410 770, 1440 770" stroke="#64748b" stroke-width="3.5" marker-end="url(#arrow)"/>

  <path d="M1580 390 C1580 415, 1580 420, 1580 450" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M1580 620 C1580 645, 1580 650, 1580 680" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="1040" y="885" width="680" height="34" rx="10" fill="#fff7ed" stroke="#fdba74"/>
  <text x="1060" y="907" class="small">Current implementation supports both local heuristic runs and DeepSeek-backed LLM runs; next scale-up step is batch execution over all Concept nodes.</text>
</svg>
